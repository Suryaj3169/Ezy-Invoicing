<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoicing-Store</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

/* Header */
header {
    background: #222;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Navbar */
nav {
    background: #444;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
}

/* Products */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    padding: 20px;
}

.product {
    background: white;
    margin: 15px;
    padding: 15px;
    width: 220px;
    border-radius: 8px;
    box-shadow: 0px 0px 8px rgba(0,0,0,0.2);
    text-align: center;
}

.product img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

button {
    background: #28a745;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #218838;
}

/* Footer */
footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Boutque Store</h1>
    <p>Best Products at Best Prices here</p>
</header>

<nav>
    <a href="#">office</a>
    <a href="#">Products</a>
    <a href="#">Cart</a>
    <a href="#">Phone Number</a>
</nav>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Smart Watch</h3>
        <p>₹2,999</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Wireless Headphones</h3>
        <p>₹1,499</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Mobile Phone</h3>
        <p>₹12,999</p>
        <button>Add to Cart</button>
    </div>

</div>

<footer>
    <p>© 2026 My E-Commerce Store | All Rights Reserved</p>
</footer>

</body>
</html>
